syntax = "proto3";

package carlife;

option java_package = "com.carlife.wireless.proto";
option java_outer_classname = "CarlifeRegisterResponseProto";

import "carlife_common.proto";
import "carlife_register_type.proto";

// Register response
message CarlifeRegisterResponse {
    RegisterResultCode result = 1;
    string registered_device_id = 2;
    uint32 keep_alive_interval_ms = 3;
    repeated string granted_capabilities = 4;
    string server_message = 5;
    string description = 6;
    string session_id = 7;
}
