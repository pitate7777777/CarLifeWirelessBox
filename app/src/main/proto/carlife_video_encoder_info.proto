syntax = "proto3";

package carlife;

option java_package = "com.carlife.wireless.proto";
option java_outer_classname = "CarlifeVideoEncoderInfoProto";

// Video codec type enumeration
enum VideoCodecType {
    VIDEO_CODEC_UNKNOWN = 0;
    VIDEO_CODEC_H264 = 1;
    VIDEO_CODEC_H265 = 2;
    VIDEO_CODEC_VP8 = 3;
    VIDEO_CODEC_VP9 = 4;
}

// Video resolution enumeration
enum VideoResolution {
    RES_UNKNOWN = 0;
    RES_480P = 1;
    RES_720P = 2;
    RES_1080P = 3;
    RES_2K = 4;
    RES_4K = 5;
}

// Video encoder info
message CarlifeVideoEncoderInfo {
    string encoder_name = 1;
    VideoCodecType codec_type = 2;
    uint32 profile = 3;
    uint32 level = 4;
    repeated VideoResolution supported_resolutions = 5;
    uint32 max_frame_rate = 6;
    uint32 max_bitrate_kbps = 7;
    bool hardware_accelerated = 8;
    uint32 supported_codecs = 9;  // Bitmask of VideoCodecType
    VideoCodecType preferred_codec = 10;
    uint32 current_resolution = 11;  // Bitmask of VideoResolution
    VideoResolution current_resolution_enum = 12;
    uint32 current_fps = 13;
    uint32 bitrate_kbps = 14;
    uint32 i_frame_interval = 15;
    bool hardware_encoder = 16;
}
