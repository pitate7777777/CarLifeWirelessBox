syntax = "proto3";

package carlife;

option java_package = "com.carlife.wireless.proto";
option java_outer_classname = "CarlifeAudioProto";

import "carlife_common.proto";

// Audio stream control
message CarlifeAudioStart {
    uint32 session_id = 1;
    string codec = 2;
    uint32 sample_rate = 3;
    uint32 channels = 4;
    uint32 bitrate_kbps = 5;
    string audio_source = 6;  // MUSIC, NAVIGATION, TTS, PHONE
}

message CarlifeAudioStop {
    uint32 session_id = 1;
    string reason = 2;
}

message CarlifeAudioPause {
    uint32 session_id = 1;
}

message CarlifeAudioResume {
    uint32 session_id = 1;
}

// Audio focus request
message CarlifeAudioFocusRequest {
    string focus_type = 1;  // GAIN, GAIN_TRANSIENT, LOSS
    string audio_stream = 2;
}

message CarlifeAudioFocusResponse {
    CarlifeStatus status = 1;
    string granted_focus = 2;
}
