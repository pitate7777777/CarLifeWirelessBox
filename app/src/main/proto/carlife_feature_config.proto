syntax = "proto3";

package carlife;

option java_package = "com.carlife.wireless.proto";
option java_outer_classname = "CarlifeFeatureConfigProto";

// Feature configuration
message CarlifeFeatureConfig {
    int64 feature_bitmap = 1;
    bool video_enabled = 2;
    bool audio_enabled = 3;
    bool tts_enabled = 4;
    bool vr_enabled = 5;
    bool touch_enabled = 6;
    bool gps_enabled = 7;
    bool bluetooth_enabled = 8;
    bool music_enabled = 9;
    bool navigation_enabled = 10;
    bool voice_enabled = 11;
    int32 max_video_bitrate = 12;
    int32 max_audio_bitrate = 13;
    int32 connection_timeout = 14;
    VideoConfig video_config = 15;
    AudioConfig audio_config = 16;
}

message VideoConfig {
    uint32 width = 1;
    uint32 height = 2;
    uint32 frame_rate = 3;
    string codec = 4;
    uint32 bitrate_kbps = 5;
}

message AudioConfig {
    uint32 sample_rate = 1;
    uint32 channels = 2;
    string format = 3;
    uint32 bitrate_kbps = 4;
}
