syntax = "proto3";

package carlife;

option java_package = "com.carlife.wireless.proto";
option java_outer_classname = "CarlifeDeviceInfoProto";

import "carlife_common.proto";

// Device type enumeration
enum DeviceType {
    DEVICE_TYPE_UNKNOWN = 0;
    DEVICE_TYPE_PHONE = 1;
    DEVICE_TYPE_HEAD_UNIT = 2;
    DEVICE_TYPE_BOX = 3;
}

// Operating system type enumeration
enum OsType {
    OS_UNKNOWN = 0;
    OS_ANDROID = 1;
    OS_IOS = 2;
    OS_LINUX = 3;
    OS_QNX = 4;
    OS_WINDOWS = 5;
}

// Device info
message CarlifeDeviceInfo {
    DeviceType device_type = 1;
    OsType os_type = 2;
    string os_version = 3;
    string manufacturer = 4;
    string model = 5;
    string device_id = 6;
    string carlife_version = 7;
    string device_name = 8;
    uint32 screen_width = 9;
    uint32 screen_height = 10;
    uint32 screen_dpi = 11;
    string hardware_version = 12;
    repeated string capabilities = 13;
    ScreenInfo screen_info = 14;
    NetworkInfo network_info = 15;
}

message ScreenInfo {
    uint32 width = 1;
    uint32 height = 2;
    uint32 dpi = 3;
    float density = 4;
    bool is_touch_screen = 5;
}

message NetworkInfo {
    string connection_type = 1;
    string ip_address = 2;
    uint32 port = 3;
    uint32 bandwidth_mbps = 4;
    uint32 signal_strength = 5;
}

message CarlifeDeviceList {
    repeated CarlifeDeviceInfo devices = 1;
}
